<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthAI – Free Medical Guidance for Everyone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const LANGUAGES = [
      { code: "en", label: "English" },
      { code: "es", label: "Español" },
      { code: "fr", label: "Français" },
      { code: "ar", label: "العربية" },
      { code: "hi", label: "हिन्दी" },
      { code: "sw", label: "Kiswahili" },
      { code: "pt", label: "Português" },
      { code: "zh", label: "中文" },
    ];

    const UI_TEXT = {
      en: {
        title: "HealthAI",
        tagline: "Free medical guidance for everyone, everywhere.",
        placeholder: "Describe your symptoms in plain language...",
        submit: "Assess My Symptoms",
        loading: "Analysing...",
        disclaimer: "This tool provides guidance only — not a medical diagnosis. In emergencies, call local emergency services immediately.",
        new: "New Assessment",
        age: "Age (optional)",
        agePlaceholder: "e.g. 34",
      },
      es: {
        title: "HealthAI",
        tagline: "Orientación médica gratuita para todos, en todas partes.",
        placeholder: "Describe tus síntomas en lenguaje sencillo...",
        submit: "Evaluar mis síntomas",
        loading: "Analizando...",
        disclaimer: "Esta herramienta solo orienta — no es un diagnóstico médico. En emergencias, llama a los servicios de emergencia locales.",
        new: "Nueva evaluación",
        age: "Edad (opcional)",
        agePlaceholder: "ej. 34",
      },
      fr: {
        title: "HealthAI",
        tagline: "Conseils médicaux gratuits pour tous, partout.",
        placeholder: "Décrivez vos symptômes en langage simple...",
        submit: "Évaluer mes symptômes",
        loading: "Analyse en cours...",
        disclaimer: "Cet outil fournit des conseils uniquement — pas un diagnostic médical. En cas d'urgence, appelez les secours locaux.",
        new: "Nouvelle évaluation",
        age: "Âge (optionnel)",
        agePlaceholder: "ex. 34",
      },
      ar: {
        title: "HealthAI",
        tagline: "إرشادات طبية مجانية للجميع، في كل مكان.",
        placeholder: "صف أعراضك بلغة بسيطة...",
        submit: "تقييم أعراضي",
        loading: "جارٍ التحليل...",
        disclaimer: "هذه الأداة توفر إرشادات فقط — وليست تشخيصاً طبياً. في حالات الطوارئ، اتصل بالخدمات الطارئة المحلية.",
        new: "تقييم جديد",
        age: "العمر (اختياري)",
        agePlaceholder: "مثال: 34",
      },
      hi: {
        title: "HealthAI",
        tagline: "सभी के लिए, हर जगह मुफ्त चिकित्सा मार्गदर्शन।",
        placeholder: "अपने लक्षणों को सरल भाषा में बताएं...",
        submit: "मेरे लक्षणों का आकलन करें",
        loading: "विश्लेषण हो रहा है...",
        disclaimer: "यह उपकरण केवल मार्गदर्शन प्रदान करता है — चिकित्सा निदान नहीं। आपातकाल में स्थानीय आपातकालीन सेवाओं को कॉल करें।",
        new: "नया आकलन",
        age: "आयु (वैकल्पिक)",
        agePlaceholder: "जैसे 34",
      },
      sw: {
        title: "HealthAI",
        tagline: "Mwongozo wa matibabu wa bure kwa kila mtu, kila mahali.",
        placeholder: "Eleza dalili zako kwa lugha rahisi...",
        submit: "Tathmini Dalili Zangu",
        loading: "Inachambua...",
        disclaimer: "Zana hii hutoa mwongozo tu — si utambuzi wa kimatibabu. Katika dharura, piga simu huduma za dharura za eneo lako.",
        new: "Tathmini Mpya",
        age: "Umri (si lazima)",
        agePlaceholder: "mfano 34",
      },
      pt: {
        title: "HealthAI",
        tagline: "Orientação médica gratuita para todos, em qualquer lugar.",
        placeholder: "Descreva seus sintomas em linguagem simples...",
        submit: "Avaliar meus sintomas",
        loading: "Analisando...",
        disclaimer: "Esta ferramenta fornece orientação apenas — não é um diagnóstico médico. Em emergências, ligue para os serviços de emergência locais.",
        new: "Nova avaliação",
        age: "Idade (opcional)",
        agePlaceholder: "ex. 34",
      },
      zh: {
        title: "HealthAI",
        tagline: "为所有人提供免费医疗指导，遍及全球。",
        placeholder: "用简单的语言描述您的症状...",
        submit: "评估我的症状",
        loading: "分析中...",
        disclaimer: "本工具仅提供指导——不是医学诊断。如有紧急情况，请立即拨打当地急救电话。",
        new: "新的评估",
        age: "年龄（可选）",
        agePlaceholder: "如 34",
      },
    };

    const URGENCY_COLORS = {
      emergency: { bg: "#ff2d2d", text: "#fff", label: "🚨 EMERGENCY" },
      urgent: { bg: "#ff8c00", text: "#fff", label: "⚠️ SEEK CARE TODAY" },
      moderate: { bg: "#f5c518", text: "#1a1a1a", label: "📋 SEE A DOCTOR SOON" },
      low: { bg: "#22c55e", text: "#fff", label: "✅ SELF-CARE LIKELY OK" },
    };

    function parseUrgency(text) {
      const t = text.toLowerCase();
      if (t.includes("emergency") || t.includes("call emergency") || t.includes("911") || t.includes("life-threatening")) return "emergency";
      if (t.includes("urgent") || t.includes("today") || t.includes("immediately") || t.includes("right away")) return "urgent";
      if (t.includes("see a doctor") || t.includes("consult") || t.includes("appointment") || t.includes("soon")) return "moderate";
      return "low";
    }

    function HealthAI() {
      const [lang, setLang] = useState("en");
      const [symptoms, setSymptoms] = useState("");
      const [age, setAge] = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const resultRef = useRef(null);
      const ui = UI_TEXT[lang] || UI_TEXT.en;
      const isRtl = lang === "ar";

      useEffect(() => {
        if (result && resultRef.current) {
          resultRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, [result]);

      async function assess() {
        if (!symptoms.trim()) return;
        setLoading(true);
        setError(null);
        setResult(null);

        const systemPrompt = `You are a compassionate, expert medical triage assistant providing free health guidance to people around the world who may lack access to healthcare. 

Your role:
- Assess symptoms clearly and honestly
- Give practical, actionable guidance
- Indicate urgency level explicitly: use one of these phrases naturally in your response: "emergency", "urgent", "see a doctor", or "self-care"
- Always mention when symptoms could be serious
- Be warm, clear, and human — not robotic or overly cautious
- Respond in the same language the user writes in (language code: ${lang})
- Structure your response with: (1) What this might be, (2) Urgency level, (3) What to do right now, (4) Warning signs to watch for

Important: You are NOT replacing a doctor. You are helping people understand their situation and make informed decisions. Always note when professional care is needed.`;

        const userMessage = `${age ? `Patient age: ${age}. ` : ""}Symptoms: ${symptoms}`;

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: systemPrompt,
              messages: [{ role: "user", content: userMessage }],
            }),
          });

          const data = await response.json();
          const text = data.content?.map(b => b.text || "").join("") || "";
          const urgency = parseUrgency(text);
          setResult({ text, urgency });
        } catch (e) {
          setError("Connection error. Please try again.");
        }
        setLoading(false);
      }

      const urgencyStyle = result ? URGENCY_COLORS[result.urgency] : null;

      return (
        <div dir={isRtl ? "rtl" : "ltr"} style={{
          minHeight: "100vh",
          background: "#0d1117",
          fontFamily: "'Georgia', 'Times New Roman', serif",
          color: "#e8e3d8",
          display: "flex",
          flexDirection: "column",
        }}>
          <header style={{
            borderBottom: "1px solid #1e2a1e",
            padding: "20px 32px",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            background: "#0a0f0a",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{
                width: 36, height: 36, borderRadius: "50%",
                background: "linear-gradient(135deg, #22c55e, #16a34a)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 18, color: "#fff", fontWeight: "bold",
              }}>+</div>
              <span style={{ fontSize: 22, fontWeight: "bold", letterSpacing: "-0.5px", color: "#f0ebe0" }}>
                {ui.title}
              </span>
              <span style={{
                fontSize: 11, background: "#1a2e1a", color: "#22c55e",
                padding: "2px 8px", borderRadius: 20, letterSpacing: 1,
                fontFamily: "monospace", border: "1px solid #22c55e33",
              }}>OPEN SOURCE · FREE</span>
            </div>
            <select
              value={lang}
              onChange={e => { setLang(e.target.value); setResult(null); setError(null); }}
              style={{
                background: "#161d16", color: "#a3b8a3", border: "1px solid #2a3a2a",
                borderRadius: 8, padding: "6px 12px", fontSize: 13,
                cursor: "pointer", outline: "none",
              }}
            >
              {LANGUAGES.map(l => (
                <option key={l.code} value={l.code}>{l.label}</option>
              ))}
            </select>
          </header>

          <div style={{
            textAlign: "center", padding: "60px 24px 40px",
            background: "radial-gradient(ellipse at 50% 0%, #0d2a0d 0%, #0d1117 60%)",
          }}>
            <div style={{ fontSize: 13, color: "#22c55e", letterSpacing: 3, marginBottom: 16, fontFamily: "monospace" }}>
              4.5 BILLION PEOPLE LACK HEALTH ACCESS
            </div>
            <h1 style={{
              fontSize: "clamp(28px, 5vw, 52px)", fontWeight: "bold",
              color: "#f0ebe0", margin: "0 0 16px", lineHeight: 1.2,
              letterSpacing: "-1px",
            }}>
              {ui.tagline}
            </h1>
            <p style={{ color: "#6b7f6b", fontSize: 14, maxWidth: 480, margin: "0 auto" }}>
              {ui.disclaimer}
            </p>
          </div>

          <main style={{
            flex: 1, maxWidth: 720, width: "100%", margin: "0 auto",
            padding: "0 24px 60px",
          }}>
            {!result ? (
              <div style={{
                background: "#111811", border: "1px solid #1e2a1e",
                borderRadius: 16, padding: 32, boxShadow: "0 24px 60px rgba(0,0,0,0.4)",
              }}>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontSize: 12, color: "#6b7f6b", marginBottom: 8, letterSpacing: 1, fontFamily: "monospace" }}>
                    {ui.age}
                  </label>
                  <input
                    type="number"
                    value={age}
                    onChange={e => setAge(e.target.value)}
                    placeholder={ui.agePlaceholder}
                    style={{
                      width: "100%", background: "#0d1117", border: "1px solid #1e2a1e",
                      borderRadius: 8, padding: "12px 16px", color: "#e8e3d8",
                      fontSize: 15, outline: "none",
                      fontFamily: "Georgia, serif",
                    }}
                  />
                </div>

                <div style={{ marginBottom: 24 }}>
                  <label style={{ display: "block", fontSize: 12, color: "#6b7f6b", marginBottom: 8, letterSpacing: 1, fontFamily: "monospace" }}>
                    SYMPTOMS
                  </label>
                  <textarea
                    value={symptoms}
                    onChange={e => setSymptoms(e.target.value)}
                    placeholder={ui.placeholder}
                    rows={5}
                    style={{
                      width: "100%", background: "#0d1117", border: "1px solid #1e2a1e",
                      borderRadius: 8, padding: "14px 16px", color: "#e8e3d8",
                      fontSize: 15, outline: "none", resize: "vertical",
                      lineHeight: 1.6, fontFamily: "Georgia, serif",
                    }}
                  />
                </div>

                {error && (
                  <div style={{
                    background: "#2a0d0d", border: "1px solid #ff2d2d44",
                    borderRadius: 8, padding: "12px 16px", color: "#ff8080",
                    marginBottom: 16, fontSize: 14,
                  }}>{error}</div>
                )}

                <button
                  onClick={assess}
                  disabled={loading || !symptoms.trim()}
                  style={{
                    width: "100%", padding: "16px 24px",
                    background: loading || !symptoms.trim()
                      ? "#1a2a1a"
                      : "linear-gradient(135deg, #22c55e, #16a34a)",
                    color: loading || !symptoms.trim() ? "#4a5a4a" : "#fff",
                    border: "none", borderRadius: 10, fontSize: 16,
                    fontWeight: "bold", cursor: loading || !symptoms.trim() ? "not-allowed" : "pointer",
                    letterSpacing: 0.5, fontFamily: "Georgia, serif",
                  }}
                >
                  {loading ? (
                    <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                      <span style={{
                        width: 16, height: 16, border: "2px solid #4a5a4a",
                        borderTopColor: "#22c55e", borderRadius: "50%",
                        animation: "spin 0.8s linear infinite",
                        display: "inline-block",
                      }} />
                      {ui.loading}
                    </span>
                  ) : ui.submit}
                </button>
              </div>
            ) : (
              <div ref={resultRef}>
                <div style={{
                  background: urgencyStyle.bg, color: urgencyStyle.text,
                  borderRadius: "16px 16px 0 0", padding: "16px 28px",
                  fontWeight: "bold", fontSize: 15, letterSpacing: 1,
                  fontFamily: "monospace",
                }}>
                  {URGENCY_COLORS[result.urgency].label}
                </div>
                <div style={{
                  background: "#111811", border: "1px solid #1e2a1e",
                  borderTop: "none", borderRadius: "0 0 16px 16px",
                  padding: 32, boxShadow: "0 24px 60px rgba(0,0,0,0.4)",
                }}>
                  <div style={{
                    fontSize: 15, lineHeight: 1.85, color: "#d4cfc4",
                    whiteSpace: "pre-wrap",
                  }}>
                    {result.text}
                  </div>
                  <div style={{
                    marginTop: 28, background: "#0a160a", borderRadius: 10,
                    padding: "16px 20px", color: "#6b7f6b", fontSize: 13,
                  }}>
                    ⚕️ {ui.disclaimer}
                  </div>
                  <button
                    onClick={() => { setResult(null); setSymptoms(""); setAge(""); setError(null); }}
                    style={{
                      marginTop: 20, width: "100%", padding: "14px 24px",
                      background: "transparent", border: "1px solid #1e2a1e",
                      borderRadius: 10, color: "#6b7f6b", fontSize: 14,
                      cursor: "pointer", fontFamily: "Georgia, serif",
                    }}
                  >
                    {ui.new}
                  </button>
                </div>
              </div>
            )}

            <div style={{
              display: "flex", gap: 24, marginTop: 40,
              borderTop: "1px solid #1e2a1e", paddingTop: 32,
              flexWrap: "wrap",
            }}>
              {[
                ["4.5B", "People without health access"],
                ["8", "Languages supported"],
                ["Free", "Always, forever"],
                ["Open", "Source & auditable"],
              ].map(([stat, label]) => (
                <div key={stat} style={{ flex: "1 1 120px", textAlign: "center" }}>
                  <div style={{ fontSize: 26, fontWeight: "bold", color: "#22c55e", letterSpacing: "-1px" }}>{stat}</div>
                  <div style={{ fontSize: 12, color: "#4a5a4a", marginTop: 4, lineHeight: 1.4 }}>{label}</div>
                </div>
              ))}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<HealthAI />);
  </script>
</body>
</html>
